# Builds the signed iOS .ipa on GitHub's free macOS runner via `eas build --local`
# (signing credentials are fetched from EAS using the EXPO_TOKEN repo secret).
# Trigger manually: Actions tab → "iOS build" → Run workflow.
# Download the .ipa artifact, then: npx eas-cli submit -p ios --path <file>.ipa
name: iOS build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build .ipa with EAS (local mode)
        run: npx eas-cli build --platform ios --profile production --local --non-interactive --output ${{ github.workspace }}/tend.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: tend-ios-build
          path: ${{ github.workspace }}/tend.ipa
          retention-days: 7
